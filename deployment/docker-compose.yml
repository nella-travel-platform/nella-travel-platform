version: '3.9'
services:
  api:
    build:
      context: ..
      dockerfile: deployment/docker/Dockerfile.api
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=nella;Username=nella;Password=nella
    depends_on:
      - postgres

  frontend:
    build:
      context: ..
      dockerfile: deployment/docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nella
      POSTGRES_USER: nella
      POSTGRES_PASSWORD: nella
    ports:
      - "5432:5432"
